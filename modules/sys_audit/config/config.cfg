# ── Output & Logging ──────────────────────────────────────────────────────────
OUTPUT_DIR="/var/log/sys_audit"          # Directory where all reports are saved
LOG_FILE="${OUTPUT_DIR}/audit.log"       # Execution log file
DEBUG_MODE="false"                       # Set to "true" for verbose debugging
MAX_LOG_SIZE_MB=10                       # Rotate logs above this size (MB)
LOG_BACKUPS=5                            # Number of rotated log files to keep

# ── Email Configuration ───────────────────────────────────────────────────────
EMAIL_RECIPIENT="merouanengineer@gmail.com"      # Default recipient email address
EMAIL_FROM="merouanengineer@gmail.com"
EMAIL_SUBJECT_PREFIX="[SYS-AUDIT]"      # Prefix added to all email subjects
DEFAULT_REPORT_TYPE="short"             # Default report type: short | full
AUTO_EMAIL="false"                      # Set to "true" to auto-email in --auto mode

# ── Remote Monitoring ────────────────────────────────────────────────────────
REMOTE_HOST="merwan@localhost"   # SSH remote target
REMOTE_REPORT_DIR="/var/log/sys_audit_remote"  # Directory on remote host
SSH_KEY="${HOME}/.ssh/id_ed25519"              # SSH key for passwordless auth
SSH_TIMEOUT=10                                 # SSH connection timeout (seconds)

# ── Alert Thresholds ─────────────────────────────────────────────────────────
CPU_ALERT_THRESHOLD=80        # Alert if CPU usage (%) exceeds this value
RAM_ALERT_THRESHOLD=90        # Alert if RAM usage (%) exceeds this value
DISK_ALERT_THRESHOLD=85       # Alert if any disk partition exceeds this (%)
ALERT_EMAIL="${EMAIL_RECIPIENT}"

# ── Aliases ─────────────────────────────────────────────────────────────────
REPORT_DIR="${OUTPUT_DIR}"             # Used by modules as alias for OUTPUT_DIR

# ── Report Metadata ───────────────────────────────────────────────────────────────
REPORT_AUTHOR="Merouane Ben Boucherit"
REPORT_INSTITUTION="NSCS — National School of Cyber Security"
REPORT_COURSE="OS2 — Operating Systems 2"
